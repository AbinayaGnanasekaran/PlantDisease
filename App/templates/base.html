<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/ionicons/2.0.1/css/ionicons.min.css">
    
    <link rel = "stylesheet" href = "https://cdnjs.cloudflare.com/ajax/libs/bttn.css/0.2.4/bttn.css">

    <title> {% block pagetitle %}

        {% endblock pagetitle %}</title>
    <style>
        .bg {

            background-image: url("images/background.jpeg");

            height: 100%;

            /* Center and scale the image nicely */
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
        }

        .file-upload input[type='file'] {
            display: none;
        }

        body {
            background-color:white;
            /* background: -webkit-linear-gradient(to right, #66a776, #043610);
            background: linear-gradient(to right, #5d9c6a, #059b0d); */
            height: 100vh;
            font-family: 'Poppins', sans-serif;
            font-size: 15px;
        }

        .rounded-lg {
            border-radius: 1rem;
        }

        .custom-file-label.rounded-pill {
            border-radius: 50rem;
        }

        .custom-file-label.rounded-pill::after {
            border-radius: 0 50rem 50rem 0;
        }

        label {
            display: inline-block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #1f2937;
            background-color: transparent;
            padding: 0;
            border-radius: 0;
            cursor: default;
        }

        .form-check-label {
            cursor: pointer;
            background-color: transparent;
            padding: 0;
            margin-left: 0.35rem;
        }

        input.form-control,
        .form-control:focus,
        .form-check-input {
            border: 1px solid #d1d5db;
            box-shadow: none;
        }

        .custom-form-card {
            border: 1px solid #e5e7eb;
            border-radius: 1.25rem;
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
        }

        .navbar {
            border-bottom: 1px solid #e5e7eb;
            box-shadow: 0 3px 16px rgba(15, 23, 42, 0.06);
        }

        .navbar-nav .nav-link {
            color: #1f2937 !important;
            padding: 0.75rem 1rem;
            border: 1px solid transparent;
            border-radius: 0.75rem;
            transition: all 0.2s ease;
            margin: 0 0.15rem;
        }

        .navbar-nav .nav-link:hover,
        .navbar-nav .nav-link:focus {
            background-color: rgba(14, 165, 233, 0.08);
            border-color: rgba(14, 165, 233, 0.16);
            color: #0f172a !important;
        }

        .navbar-nav .nav-link.active {
            background-color: rgba(16, 185, 129, 0.16);
            border-color: rgba(16, 185, 129, 0.24);
            color: #064e3b !important;
        }

        .upload-label {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 140px;
            height: 46px;
            border-radius: 0.8rem;
            border: 1px solid #22c55e;
            background-color: #ffffff;
            color: #0f5132;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
            padding: 0 1rem;
        }

        .upload-label:hover {
            background-color: #ecfdf5;
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(34, 197, 94, 0.14);
        }

        #file-chosen {
            margin-left: 0.8rem;
            font-family: sans-serif;
            color: #111827;
        }

        .footer-basic {
            margin-top: 10%;
            padding: 40px 0;
            background-color: #042908;
            color: #f1f3f5;
        }

     
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light py-3">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#" style="font-size: 20px;font-weight: 600;color:  #ff914d;">
                <img src="static\uploads\logo0.jpg" style="width: 30px; margin-right: 10px;" alt="PlantCure logo">
                PlantCure
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path.startswith('/market') %}active{% endif %}" href="./market">Supplements</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path.startswith('/index') %}active{% endif %}" href="./index">AiEngine</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <!-- <li class="nav-item">
                        <a class="nav-link {% if request.path.startswith('/contact') %}active{% endif %}" href="./contact">Contact Us</a>
                    </li> -->
                    {% if current_user.is_authenticated %}
                        <li class="nav-item">
                            <a class="nav-link {% if request.path.startswith('/dashboard') %}active{% endif %}" href="{{ url_for('dashboard') }}">Dashboard</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.path.startswith('/saved-remedies') %}active{% endif %}" href="{{ url_for('saved_remedies') }}">My Remedies</a>
                        </li>
                        <li class="nav-item">
                            <span class="nav-link">Welcome, {{ current_user.username }}!</span>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{{ url_for('logout') }}">Logout</a>
                        </li>
                    {% else %}
                        <li class="nav-item">
                            <a class="nav-link" href="{{ url_for('login') }}">Login</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{{ url_for('signup') }}">Sign Up</a>
                        </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>
    {% block body %}

    {% endblock body %}
    <div class="footer-basic">
      
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-qQ2dYHCDnqwGZ8DSN3a+psvX7FQ2F5QfKVA5AimJpTtq3uj5Ef9fe2xqgzFh5lR9" crossorigin="anonymous"></script>
</body>

</html>
